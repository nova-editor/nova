name: Web — Deploy to nova_web

# ─── ARCHITECTURE NOTE (read before editing) ──────────────────────────────────
#
#  This workflow mirrors web/ from this private repo to the public nova_web repo
#  so the website and latest.json are publicly accessible.
#
#  Trigger order:
#    1. web-sync.yml  — pulls DMG + latest.json from nova release into web/
#    2. THIS FILE     — pushes web/ to mugiwaraluffy56/nova_web
#
#  The in-app Tauri updater reads:
#    https://raw.githubusercontent.com/mugiwaraluffy56/nova_web/main/latest.json
#
#  Required secrets (nova → Settings → Secrets → Actions):
#    NOVA_WEB_PAT — GitHub PAT with `repo` scope on mugiwaraluffy56/nova_web
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Push web/ → nova_web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push web/ contents to nova_web
        env:
          NOVA_WEB_PAT: ${{ secrets.NOVA_WEB_PAT }}
        run: |
          git clone --depth 1 \
            "https://x-access-token:$NOVA_WEB_PAT@github.com/mugiwaraluffy56/nova_web.git" \
            /tmp/nova_web

          # Sync web/ into nova_web root (preserve nova_web's .git and .github)
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            web/ /tmp/nova_web/

          cd /tmp/nova_web
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && echo "No changes to deploy." && exit 0
          git commit -m "deploy: sync from nova@${{ github.sha }}"
          git push
