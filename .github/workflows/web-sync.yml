name: Web — Sync Release Assets

# ─── ARCHITECTURE NOTE (read before editing) ──────────────────────────────────
#
#  nova (this repo, PRIVATE)
#  ├── src-tauri/          ← Tauri/Rust desktop app
#  ├── src/                ← React frontend
#  └── web/                ← Product website source  ◄── you are here
#
#  nova_web (PUBLIC repo, mugiwaraluffy56/nova_web)
#  └── mirror of web/      ← served as the public website + updater endpoint
#
#  The Tauri in-app updater inside Nova points to:
#    https://raw.githubusercontent.com/mugiwaraluffy56/nova_web/main/latest.json
#  That file is downloaded here from the private nova release and committed
#  to nova_web via the web-deploy.yml workflow.
#
#  DO NOT move latest.json fetching to web-deploy.yml — it needs the
#  NOVA_TOKEN to pull from the private release API.
#
#  Required secrets (nova → Settings → Secrets → Actions):
#    NOVA_TOKEN   — GitHub PAT with `repo` scope (reads private nova releases)
#    NOVA_REPO    — e.g. mugiwaraluffy56/nova
#    NOVA_WEB_PAT — GitHub PAT with `repo` scope on nova_web (for deploy push)
# ──────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'   # poll every 6 hours

permissions:
  contents: write

jobs:
  sync:
    name: Pull release assets into web/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch release metadata & download assets
        id: sync
        env:
          NOVA_TOKEN: ${{ secrets.NOVA_TOKEN }}
          NOVA_REPO:  ${{ secrets.NOVA_REPO }}
        run: |
          RELEASE=$(curl -sf \
            -H "Authorization: token $NOVA_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$NOVA_REPO/releases/latest")

          TAG=$(echo "$RELEASE" | jq -r '.tag_name')

          # Skip if already synced
          if [ -f "web/downloads/.synced_tag" ] && \
             [ "$(cat web/downloads/.synced_tag)" = "$TAG" ]; then
            echo "Already synced $TAG — nothing to do."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Helper: download a release asset by name pattern
          download_asset() {
            local PATTERN="$1" DEST="$2"
            local URL
            URL=$(echo "$RELEASE" | jq -r \
              ".assets[] | select(.name | test(\"$PATTERN\")) | .url" | head -1)
            if [ -z "$URL" ] || [ "$URL" = "null" ]; then
              echo "⚠  No asset matching '$PATTERN' in $TAG — skipping."
              return 0
            fi
            echo "↓  $(echo "$RELEASE" | jq -r \
              ".assets[] | select(.name | test(\"$PATTERN\")) | .name" | head -1)"
            curl -sfL \
              -H "Authorization: token $NOVA_TOKEN" \
              -H "Accept: application/octet-stream" \
              "$URL" -o "$DEST"
          }

          # ── macOS DMG ────────────────────────────────────────────────────────
          DMG_NAME=$(echo "$RELEASE" | jq -r \
            '.assets[] | select(.name | test("aarch64.*\\.dmg$")) | .name' | head -1)

          if [ -z "$DMG_NAME" ] || [ "$DMG_NAME" = "null" ]; then
            echo "No aarch64 DMG in $TAG — skipping."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mkdir -p web/downloads
          download_asset "aarch64.*\\.dmg$" "web/downloads/$DMG_NAME"

          # Remove stale DMGs
          find web/downloads/ -name "*.dmg" ! -name "$DMG_NAME" -delete

          # Write synced tag marker
          echo "$TAG" > web/downloads/.synced_tag

          # ── Tauri update manifest (latest.json) ──────────────────────────────
          # Fetched here (needs NOVA_TOKEN) and committed alongside web/ so
          # web-deploy.yml can push it to nova_web for the public updater endpoint.
          download_asset "^latest\\.json$" "web/latest.json"

          # ── Update HTML download links ────────────────────────────────────────
          sed -i "s|downloads/nova_[^\"']*_aarch64\.dmg|downloads/$DMG_NAME|g" \
            web/index.html web/manual.html

          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"
          echo "dmg_name=$DMG_NAME" >> "$GITHUB_OUTPUT"
          echo "changed=true"       >> "$GITHUB_OUTPUT"

      - name: Commit synced assets
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/
          git diff --staged --quiet && exit 0
          git commit -m "release: sync nova ${{ steps.sync.outputs.tag }}"
          git push
