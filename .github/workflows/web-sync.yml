name: Web — Sync Release Assets

# ─── ARCHITECTURE NOTE (read before editing) ──────────────────────────────────
#
#  nova (this repo, PRIVATE)
#  ├── src-tauri/          ← Tauri/Rust desktop app
#  ├── src/                ← React frontend
#  └── web/                ← Product website source  ◄── you are here
#
#  nova_web (PUBLIC repo, mugiwaraluffy56/nova_web)
#  └── mirror of web/      ← served as the public website + updater endpoint
#
#  Downloads on the website point directly to:
#    https://github.com/mugiwaraluffy56/nova/releases/latest
#
#  The Tauri in-app updater inside Nova points to:
#    https://raw.githubusercontent.com/mugiwaraluffy56/nova_web/main/latest.json
#  That file is fetched here from the private nova release (needs NOVA_TOKEN)
#  and committed into web/ so web-deploy.yml can push it to nova_web publicly.
#
#  DO NOT fetch latest.json in web-deploy.yml — it needs NOVA_TOKEN which
#  should not be added to a deploy-only workflow.
#
#  Required secrets (nova → Settings → Secrets → Actions):
#    NOVA_TOKEN  — GitHub PAT with `repo` scope (reads private nova releases)
#    NOVA_REPO   — e.g. mugiwaraluffy56/nova
# ──────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'   # poll every 6 hours

permissions:
  contents: write

jobs:
  sync:
    name: Pull latest.json into web/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest release and sync latest.json
        id: sync
        env:
          NOVA_TOKEN: ${{ secrets.NOVA_TOKEN }}
          NOVA_REPO:  ${{ secrets.NOVA_REPO }}
        run: |
          RELEASE=$(curl -sf \
            -H "Authorization: token $NOVA_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$NOVA_REPO/releases/latest")

          TAG=$(echo "$RELEASE" | jq -r '.tag_name')

          # Skip if already synced
          if [ -f "web/.synced_tag" ] && [ "$(cat web/.synced_tag)" = "$TAG" ]; then
            echo "Already synced $TAG — nothing to do."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Download latest.json (Tauri update manifest)
          MANIFEST_URL=$(echo "$RELEASE" | jq -r \
            '.assets[] | select(.name == "latest.json") | .url' | head -1)

          if [ -z "$MANIFEST_URL" ] || [ "$MANIFEST_URL" = "null" ]; then
            echo "No latest.json in release $TAG — skipping."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "↓ latest.json (release $TAG)"
          curl -sfL \
            -H "Authorization: token $NOVA_TOKEN" \
            -H "Accept: application/octet-stream" \
            "$MANIFEST_URL" -o "web/latest.json"

          echo "$TAG" > web/.synced_tag

          echo "tag=$TAG"      >> "$GITHUB_OUTPUT"
          echo "changed=true"  >> "$GITHUB_OUTPUT"

      - name: Commit synced manifest
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/latest.json web/.synced_tag
          git diff --staged --quiet && exit 0
          git commit -m "release: sync nova ${{ steps.sync.outputs.tag }}"
          git push
