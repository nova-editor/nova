name: Web — Sync Release Assets

# ─── HOW THIS WORKS ───────────────────────────────────────────────────────────
#
#  1. You tag a release  →  release.yml builds DMG + latest.json on GitHub Releases
#  2. This workflow runs →  downloads DMG + latest.json into web/
#  3. Commits to main   →  Vercel auto-deploys web/ as the public website
#
#  Users download the DMG directly from Vercel.
#  The Tauri in-app updater checks:
#    https://<your-vercel-domain>/latest.json
#
#  Required secrets (nova-editor → Settings → Secrets → Actions):
#    NOVA_TOKEN  — GitHub PAT with `repo` scope (to read private releases)
#    NOVA_REPO   — mugiwaraluffy56/nova-editor
# ──────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  sync:
    name: Pull release assets into web/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch release metadata
        id: meta
        env:
          NOVA_TOKEN: ${{ secrets.NOVA_TOKEN }}
          NOVA_REPO:  ${{ secrets.NOVA_REPO }}
        run: |
          RELEASE=$(curl -sf \
            -H "Authorization: token $NOVA_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$NOVA_REPO/releases/latest")

          TAG=$(echo "$RELEASE" | jq -r '.tag_name')

          if [ -f "web/downloads/.synced_tag" ] && \
             [ "$(cat web/downloads/.synced_tag)" = "$TAG" ]; then
            echo "Already synced $TAG — nothing to do."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "RELEASE_JSON<<EOF" >> "$GITHUB_ENV"
          echo "$RELEASE"          >> "$GITHUB_ENV"
          echo "EOF"               >> "$GITHUB_ENV"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "changed=true"     >> "$GITHUB_OUTPUT"

      - name: Download assets
        if: steps.meta.outputs.changed == 'true'
        env:
          NOVA_TOKEN: ${{ secrets.NOVA_TOKEN }}
        run: |
          mkdir -p web/downloads

          download_asset() {
            local PATTERN="$1" DEST="$2"
            local URL
            URL=$(echo "$RELEASE_JSON" | jq -r \
              ".assets[] | select(.name | test(\"$PATTERN\")) | .url" | head -1)
            [ -z "$URL" ] || [ "$URL" = "null" ] && { echo "⚠ No asset: $PATTERN"; return 0; }
            curl -sfL \
              -H "Authorization: token $NOVA_TOKEN" \
              -H "Accept: application/octet-stream" \
              "$URL" -o "$DEST"
          }

          # ── macOS DMG ────────────────────────────────────────────────────
          DMG_NAME=$(echo "$RELEASE_JSON" | jq -r \
            '.assets[] | select(.name | test("\\.dmg$")) | .name' | head -1)
          if [ -n "$DMG_NAME" ] && [ "$DMG_NAME" != "null" ]; then
            echo "↓ $DMG_NAME"
            download_asset "\\.dmg$" "web/downloads/$DMG_NAME"
            find web/downloads/ -name "*.dmg" ! -name "$DMG_NAME" -delete
            sed -i "s|downloads/nova_[^\"']*\.dmg|downloads/$DMG_NAME|g" \
              web/index.html web/manual.html 2>/dev/null || true
            sed -i "s|href=\"downloads/nova_LATEST_aarch64\.dmg\"|href=\"downloads/$DMG_NAME\"|g" \
              web/index.html 2>/dev/null || true
          fi

          # ── Windows NSIS installer ───────────────────────────────────────
          WIN_NAME=$(echo "$RELEASE_JSON" | jq -r \
            '.assets[] | select(.name | test("x64-setup\\.exe$")) | .name' | head -1)
          if [ -n "$WIN_NAME" ] && [ "$WIN_NAME" != "null" ]; then
            echo "↓ $WIN_NAME"
            download_asset "x64-setup\\.exe$" "web/downloads/$WIN_NAME"
            find web/downloads/ -name "*-setup.exe" ! -name "$WIN_NAME" -delete
            sed -i "s|downloads/nova_[^\"']*x64-setup\.exe|downloads/$WIN_NAME|g" \
              web/index.html 2>/dev/null || true
            sed -i "s|href=\"downloads/nova_LATEST_x64-setup\.exe\"|href=\"downloads/$WIN_NAME\"|g" \
              web/index.html 2>/dev/null || true
          fi

          # ── Linux AppImage ───────────────────────────────────────────────
          APPIMAGE_NAME=$(echo "$RELEASE_JSON" | jq -r \
            '.assets[] | select(.name | test("\\.AppImage$")) | .name' | head -1)
          if [ -n "$APPIMAGE_NAME" ] && [ "$APPIMAGE_NAME" != "null" ]; then
            echo "↓ $APPIMAGE_NAME"
            download_asset "\\.AppImage$" "web/downloads/$APPIMAGE_NAME"
            find web/downloads/ -name "*.AppImage" ! -name "$APPIMAGE_NAME" -delete
            sed -i "s|downloads/nova_[^\"']*\.AppImage|downloads/$APPIMAGE_NAME|g" \
              web/index.html 2>/dev/null || true
            sed -i "s|href=\"downloads/nova_LATEST_amd64\.AppImage\"|href=\"downloads/$APPIMAGE_NAME\"|g" \
              web/index.html 2>/dev/null || true
          fi

          # ── Tauri update manifest ────────────────────────────────────────
          echo "↓ latest.json"
          download_asset "^latest\\.json$" "web/latest.json"

          echo "${{ steps.meta.outputs.tag }}" > web/downloads/.synced_tag

      - name: Commit and push
        if: steps.meta.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/
          git diff --staged --quiet && exit 0
          git commit -m "release: sync ${{ steps.meta.outputs.tag }}"
          git push
