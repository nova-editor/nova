name: Web — Sync Release Assets

# ─── HOW THIS WORKS ───────────────────────────────────────────────────────────
#
#  1. You tag a release  →  release.yml builds DMG + latest.json on GitHub Releases
#  2. This workflow runs →  downloads DMG + latest.json into web/
#  3. Commits to main   →  Vercel auto-deploys web/ as the public website
#
#  Users download the DMG directly from Vercel.
#  The Tauri in-app updater checks:
#    https://<your-vercel-domain>/latest.json
#
#  Required secrets (nova-editor → Settings → Secrets → Actions):
#    NOVA_TOKEN  — GitHub PAT with `repo` scope (to read private releases)
#    NOVA_REPO   — mugiwaraluffy56/nova-editor
# ──────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  sync:
    name: Pull release assets into web/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch release metadata
        id: meta
        env:
          NOVA_TOKEN: ${{ secrets.NOVA_TOKEN }}
          NOVA_REPO:  ${{ secrets.NOVA_REPO }}
        run: |
          RELEASE=$(curl -sf \
            -H "Authorization: token $NOVA_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$NOVA_REPO/releases/latest")

          TAG=$(echo "$RELEASE" | jq -r '.tag_name')

          if [ -f "web/downloads/.synced_tag" ] && \
             [ "$(cat web/downloads/.synced_tag)" = "$TAG" ]; then
            echo "Already synced $TAG — nothing to do."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "RELEASE_JSON<<EOF" >> "$GITHUB_ENV"
          echo "$RELEASE"          >> "$GITHUB_ENV"
          echo "EOF"               >> "$GITHUB_ENV"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "changed=true"     >> "$GITHUB_OUTPUT"

      - name: Download assets
        if: steps.meta.outputs.changed == 'true'
        env:
          NOVA_TOKEN: ${{ secrets.NOVA_TOKEN }}
        run: |
          mkdir -p web/downloads

          download_asset() {
            local PATTERN="$1" DEST="$2"
            local URL
            URL=$(echo "$RELEASE_JSON" | jq -r \
              ".assets[] | select(.name | test(\"$PATTERN\")) | .url" | head -1)
            [ -z "$URL" ] || [ "$URL" = "null" ] && { echo "⚠ No asset: $PATTERN"; return 0; }
            curl -sfL \
              -H "Authorization: token $NOVA_TOKEN" \
              -H "Accept: application/octet-stream" \
              "$URL" -o "$DEST"
          }

          # macOS DMG
          DMG_NAME=$(echo "$RELEASE_JSON" | jq -r \
            '.assets[] | select(.name | test("aarch64.*\\.dmg$")) | .name' | head -1)
          [ -z "$DMG_NAME" ] || [ "$DMG_NAME" = "null" ] && { echo "No DMG found"; exit 1; }

          echo "↓ $DMG_NAME"
          download_asset "aarch64.*\\.dmg$" "web/downloads/$DMG_NAME"
          find web/downloads/ -name "*.dmg" ! -name "$DMG_NAME" -delete

          # Tauri update manifest
          echo "↓ latest.json"
          download_asset "^latest\\.json$" "web/latest.json"

          # Update HTML links
          sed -i "s|downloads/nova_[^\"']*_aarch64\.dmg|downloads/$DMG_NAME|g" \
            web/index.html web/manual.html 2>/dev/null || true

          echo "${{ steps.meta.outputs.tag }}" > web/downloads/.synced_tag
          echo "dmg=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Commit and push
        if: steps.meta.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/
          git diff --staged --quiet && exit 0
          git commit -m "release: sync ${{ steps.meta.outputs.tag }}"
          git push
